<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Devon Cultural Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div id="layout">
    <div id="map"></div>

    <!-- Mobile filter bar overlaid on map -->
    <div id="mobileFilterBar">
        <select id="categoryFilter">
            <option value="All">All Categories</option>
            <option value="Horrible History">Horrible History</option>
            <option value="Literary">Literary</option>
            <option value="Military">Military</option>
        </select>
    </div>

    <div id="mobileResetBtn" onclick="resetMapView()">⌂ Reset</div>

    <div id="mobileHint">📍 Tap a marker to explore</div>

    <!-- Detail panel — slides up on mobile, fixed sidebar on desktop -->
    <div id="details">
        <div id="filterBar">
            <select id="categoryFilterDesktop">
                <option value="All">All Categories</option>
                <option value="Horrible History">Horrible History</option>
                <option value="Literary">Literary</option>
                <option value="Military">Military</option>
            </select>
        </div>

        <div id="detailsContent">
            <div class="place-card">
                <h1>Devon Cultural Map</h1>
                <p class="intro">Click a marker to explore a literary or cultural location.</p>
                <div class="return-map" onclick="resetMapView()"><span class="return-icon">☚</span> Reset map view</div>
            </div>
        </div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
<script src="app.js"></script>

</body>
</html>
