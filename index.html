<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Devon Cultural Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css"/>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="layout">
    <div id="map"></div>
    <!-- Mobile filter bar overlaid on map -->
    <div id="mobileFilterBar">
        <select id="categoryFilter">
            <option value="All">All Categories</option>
            <option value="Horrible History">Horrible History</option>
            <option value="Literary">Literary</option>
            <option value="Maritime">Maritime</option>
            <option value="Military">Military</option>
        </select>
    </div>
    <div id="mobileHomeBtn" onclick="resetMapView(); closePanel();">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none">
            <path d="M12 4 a8 8 0 1 1 -6.4 3.2" stroke="white" stroke-width="2.5" stroke-linecap="round" fill="none"/>
            <polygon points="3,4 3,10 9,7" fill="white"/>
        </svg>
    </div>
    <!-- Detail panel — slides up on mobile, fixed sidebar on desktop -->
    <div id="details">
        <div id="filterBar">
            <select id="categoryFilterDesktop">
                <option value="All">All Categories</option>
                <option value="Horrible History">Horrible History</option>
                <option value="Literary">Literary</option>
                <option value="Military">Military</option>
            </select>
        </div>
        <div id="detailsContent">
            <div class="place-card">
                <h1>Devon Cultural Map</h1>
                <p class="intro">Click a marker to explore a literary or cultural location.</p>
                <div class="return-map" onclick="resetMapView()"><span class="return-icon">☚</span> Reset map view</div>
            </div>
        </div>
        <div id="heAttribution">
            © Historic England 2026 · Contains Ordnance Survey data © Crown copyright and database right 2026
        </div>
    </div>
</div>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script src="https://unpkg.com/papaparse@5.4.1/papaparse.min.js"></script>
<script src="app.js"></script>
</body>
</html>
